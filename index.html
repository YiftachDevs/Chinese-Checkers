<!DOCTYPE html>
<html>
<head>
    <title>Checkers Multiplayer Sandbox</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 5px solid #444; margin-top: 20px; }
        .cell { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }
        .dark { background-color: #5d3a1a; }
        .light { background-color: #e3c193; }
        .piece { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #000; cursor: pointer; position: relative; }
        .red { background: #ff4444; box-shadow: 0 4px #900; }
        .black { background: #333; box-shadow: 0 4px #000; }
        .selected { border: 4px solid #00ff00 !important; transform: scale(1.1); }
    </style>
</head>
<body>
    <h1>Checkers Sandbox</h1>
    <p>Click a piece, then click a target cell to move.</p>
    <div id="board"></div>

    <script>
        const socket = io(); // חיבור אוטומטי לשרת
        const boardElement = document.getElementById('board');
        let pieces = [];
        let selectedPieceId = null;

        function initBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.onclick = () => moveSelectedPiece(r, c);
                    cell.id = `cell-${r}-${c}`;
                    boardElement.appendChild(cell);
                }
            }
        }

        function draw() {
            document.querySelectorAll('.piece').forEach(p => p.remove());
            pieces.forEach(p => {
                const pDiv = document.createElement('div');
                pDiv.className = `piece ${p.color} ${selectedPieceId === p.id ? 'selected' : ''}`;
                pDiv.onclick = (e) => {
                    e.stopPropagation();
                    selectedPieceId = p.id;
                    draw();
                };
                const targetCell = document.getElementById(`cell-${p.row}-${p.col}`);
                if (targetCell) targetCell.appendChild(pDiv);
            });
        }

        function moveSelectedPiece(row, col) {
            if (selectedPieceId !== null) {
                const piece = pieces.find(p => p.id === selectedPieceId);
                if (piece) {
                    piece.row = row;
                    piece.col = col;
                    socket.emit('movePiece', { id: piece.id, row, col });
                    selectedPieceId = null;
                    draw();
                }
            }
        }

        socket.on('boardState', (data) => { pieces = data; initBoard(); draw(); });
        socket.on('pieceMoved', (data) => {
            const piece = pieces.find(p => p.id === data.id);
            if (piece) {
                piece.row = data.row;
                piece.col = data.col;
                draw();
            }
        });
    </script>
</body>
</html>
